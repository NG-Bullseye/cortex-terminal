# ════════════════════════════════════════════════════════════════════
# common/hardware.yaml — CYD-Plattform-Boilerplate (wiederverwendbar)
# ────────────────────────────────────────────────────────────────────
# Alles was auf JEDEM CYD-Display identisch ist: Chip, Konnektivität,
# SPI/Display/Touch-Pinout, Outputs, Backlight, Status-LED.
# Pro-Display variabel über Substitutions (vom Device-File gesetzt):
#   ${device_name}  Firmware-Hostname (HA-gepairt, flash-fix)
#   ${static_ip}    statische IP (siehe displays.yaml)
# Kein Bezug auf UI-spezifische LVGL-IDs → enthält KEINE Pages/Globals.
# ════════════════════════════════════════════════════════════════════

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !env_var ESPHOME_WIFI_SSID
  password: !env_var ESPHOME_WIFI_PASSWORD
  manual_ip:
    static_ip: ${static_ip}
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Web server for direct HTTP access (MCP endpoint)
web_server:
  port: 80

# ── HTTP Request (HA API calls) ─────────────────────────
http_request:
  id: http_request_component
  useragent: esphome/${device_name}
  timeout: 3s

# ── SPI Buses ──────────────────────────────────────────
spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin:
      number: 12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

# ── Outputs ────────────────────────────────────────────
output:
  - id: backlight_pwm
    platform: ledc
    pin: 21
  - id: led_red
    platform: ledc
    pin: 4
    inverted: true
  - id: led_green
    platform: ledc
    pin: 16
    inverted: true
  - id: led_blue
    platform: ledc
    pin: 17
    inverted: true

light:
  # Status-LED bleibt light (RGB — braucht color-control). Backlight ist
  # zu switch konvertiert (siehe unten) damit cortex nicht "alle lichter aus"
  # auch das display-backlight ausschaltet.
  - id: status_led
    platform: rgb
    red: led_red
    green: led_green
    blue: led_blue
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# ── Backlight als SWITCH statt LIGHT ──────────────────────────────────
# Reason: cortex/HA interpretiert "light.*" entities als steuerbare Wohnraum-
# beleuchtung. Display-backlight des CYD ist aber kein Wohnraum-licht und
# sollte nicht von "alle lichter aus" mitgemacht werden. Als switch ist das
# toggle (on/off) trotzdem moeglich, aber HA klassifiziert nicht als light →
# routinen ignorieren das. Dim-level ist auf 80% fixed.
switch:
  - platform: template
    id: backlight
    name: "Display Backlight"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - output.set_level:
          id: backlight_pwm
          level: 80%
    turn_off_action:
      - output.set_level:
          id: backlight_pwm
          level: 0%

# ── Display ────────────────────────────────────────────
display:
  - id: main_display
    platform: ili9xxx
    model: ILI9341
    spi_id: tft
    cs_pin:
      number: 15
      ignore_strapping_warning: true
    dc_pin:
      number: 2
      ignore_strapping_warning: true
    invert_colors: false
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    dimensions:
      width: 320
      height: 240
    update_interval: never
    auto_clear_enabled: false

# ── Touchscreen (Pinout + Kalibrierung + generisches Coord-Tracking) ───
# on_touch speichert die letzten Koordinaten in Globals (UI-frei) und
# loggt sie. Ein Device-File kann diese Globals z.B. in einem DEV-Label
# anzeigen, ohne den geteilten Touchscreen anfassen zu muessen.
touchscreen:
  - id: main_touch
    platform: xpt2046
    spi_id: touch
    cs_pin: 33
    # interrupt_pin entfernt - erzwingt Polling-Modus (kein SPI-Read wenn IRQ nicht LOW)
    threshold: 1000
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    on_touch:
      then:
        - globals.set:
            id: last_touch_x
            value: !lambda 'return touch.x;'
        - globals.set:
            id: last_touch_y
            value: !lambda 'return touch.y;'
        - logger.log:
            format: "TOUCH: x=%d y=%d (raw_x=%d raw_y=%d)"
            args: [touch.x, touch.y, touch.x_raw, touch.y_raw]

# ── Globals (Plattform — letzte Touch-Koordinaten) ─────
globals:
  - id: last_touch_x
    type: int
    initial_value: '0'
  - id: last_touch_y
    type: int
    initial_value: '0'

# Diagnose: IRQ-Pin GPIO36 überwachen
binary_sensor:
  - platform: gpio
    pin:
      number: 36
      mode: INPUT
    name: "Touch IRQ"
    id: touch_irq
    filters:
      - delayed_on: 0ms
    on_press:
      - logger.log: "IRQ36: LOW (touch detected by hardware)"
    on_release:
      - logger.log: "IRQ36: HIGH (released)"

# ── Sensors (Plattform-Diagnose, kein UI-ID-Bezug) ─────
sensor:
  - platform: adc
    pin: 34
    name: "Ambient Light"
    id: ambient_light
    update_interval: 30s
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    id: uptime_sec
