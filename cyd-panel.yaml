esphome:
  name: cyd-panel
  friendly_name: "Nabu Terminal"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: !env_var ESPHOME_WIFI_SSID
  password: !env_var ESPHOME_WIFI_PASSWORD
  manual_ip:
    static_ip: 192.168.1.240
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# Web server for direct HTTP access (MCP endpoint)
web_server:
  port: 80

# ── HTTP Request (HA API calls) ─────────────────────────
http_request:
  id: http_request_component
  useragent: esphome/cyd-panel
  timeout: 3s

# ── SPI Buses ──────────────────────────────────────────
spi:
  - id: tft
    clk_pin: 14
    mosi_pin: 13
    miso_pin:
      number: 12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

# ── Outputs ────────────────────────────────────────────
output:
  - id: backlight_pwm
    platform: ledc
    pin: 21
  - id: led_red
    platform: ledc
    pin: 4
    inverted: true
  - id: led_green
    platform: ledc
    pin: 16
    inverted: true
  - id: led_blue
    platform: ledc
    pin: 17
    inverted: true

light:
  # Status-LED bleibt light (RGB — braucht color-control). Backlight ist
  # zu switch konvertiert (siehe unten) damit cortex nicht "alle lichter aus"
  # auch das display-backlight ausschaltet.
  - id: status_led
    platform: rgb
    red: led_red
    green: led_green
    blue: led_blue
    name: "Status LED"
    restore_mode: ALWAYS_OFF

# ── Backlight als SWITCH statt LIGHT ──────────────────────────────────
# Reason: cortex/HA interpretiert "light.*" entities als steuerbare Wohnraum-
# beleuchtung. Display-backlight des CYD-Panels ist aber kein Wohnraum-licht
# und sollte nicht von "alle lichter aus" mitgemacht werden. Als switch ist
# das toggle (on/off) trotzdem moeglich, aber HA klassifiziert nicht als
# light → routinen ignorieren das. Dim-level ist auf 80% fixed.
switch:
  - platform: template
    id: backlight
    name: "Display Backlight"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - output.set_level:
          id: backlight_pwm
          level: 80%
    turn_off_action:
      - output.set_level:
          id: backlight_pwm
          level: 0%

# ── Display ────────────────────────────────────────────
display:
  - id: main_display
    platform: ili9xxx
    model: ILI9341
    spi_id: tft
    cs_pin:
      number: 15
      ignore_strapping_warning: true
    dc_pin:
      number: 2
      ignore_strapping_warning: true
    invert_colors: false
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    dimensions:
      width: 320
      height: 240
    update_interval: never
    auto_clear_enabled: false

# ── Touchscreen ────────────────────────────────────────
touchscreen:
  - id: main_touch
    platform: xpt2046
    spi_id: touch
    cs_pin: 33
    # interrupt_pin entfernt - erzwingt Polling-Modus (kein SPI-Read wenn IRQ nicht LOW)
    threshold: 1000
    on_touch:
      then:
        - globals.set:
            id: last_touch_x
            value: !lambda 'return touch.x;'
        - globals.set:
            id: last_touch_y
            value: !lambda 'return touch.y;'
        - logger.log:
            format: "TOUCH: x=%d y=%d (raw_x=%d raw_y=%d)"
            args: [touch.x, touch.y, touch.x_raw, touch.y_raw]
        - lvgl.label.update:
            id: lbl_dev_coords
            text: !lambda |-
              char buf[32];
              snprintf(buf, sizeof(buf), "LAST: x=%-4d y=%-4d", touch.x, touch.y);
              return std::string(buf);
    calibration:
      x_min: 280
      x_max: 3860
      y_min: 340
      y_max: 3860
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true

# Diagnose: IRQ-Pin GPIO36 überwachen
binary_sensor:
  - platform: gpio
    pin:
      number: 36
      mode: INPUT
    name: "Touch IRQ"
    id: touch_irq
    filters:
      - delayed_on: 0ms
    on_press:
      - logger.log: "IRQ36: LOW (touch detected by hardware)"
    on_release:
      - logger.log: "IRQ36: HIGH (released)"

# ── Globals ────────────────────────────────────────────
globals:
  - id: last_touch_x
    type: int
    initial_value: '0'
  - id: last_touch_y
    type: int
    initial_value: '0'
  # Feed button IDs stored for click handler callback
  - id: feed_btn_ids
    type: std::vector<std::string>
    initial_value: 'std::vector<std::string>()'
  # Pending fix: when user taps a bug button, store ID here for the interval to POST
  - id: pending_fix_id
    type: std::string
    initial_value: '""'
  # Cortex User-Blackout state (mirrors /api/blackout poll, drives slot3 + status LED)
  - id: blackout_active
    type: bool
    initial_value: 'false'
    restore_value: false

# ── Sensors ────────────────────────────────────────────
sensor:
  - platform: adc
    pin: 34
    name: "Ambient Light"
    id: ambient_light
    update_interval: 30s
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    id: uptime_sec

# ── Text Sensors (HA → Display) ───────────────────────

# Nabu Kommunikationskanal: HA/MCP setzt diesen Text
text_sensor:
  - platform: template
    name: "Nabu Message"
    id: nabu_message
    update_interval: never
    lambda: 'return {"SYSTEMS NOMINAL"};'
  - platform: template
    name: "Watchdog Alert"
    id: watchdog_alert
    update_interval: never
    lambda: 'return {"NO ALERTS"};'
  - platform: template
    name: "Room Zone"
    id: room_zone
    update_interval: never
    lambda: 'return {"--"};'
  - platform: homeassistant
    name: "HA Zone"
    id: ha_zone
    entity_id: sensor.room_zone
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_zone
            text: !lambda 'return ("ZONE: " + x).c_str();'
  - platform: homeassistant
    name: "Management Message"
    id: mgmt_message
    entity_id: input_text.management_message
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_nabu_msg
            text: !lambda 'return x.c_str();'

  # ── Slot State Streams (HA → Button color) ──
  # Slot3 BLACKOUT state: NICHT mehr via HA, Cortex-poll (interval 5s unten)
  # ist die einzige Wahrheit. Der HA-Helper input_boolean.nabu_blackout war
  # unavailable und hat den Button rot+dead gesetzt → entfernt.

  - platform: homeassistant
    name: "Slot4 REBOUND state"
    id: slot4_state
    entity_id: input_boolean.nabu_rebound
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.obj.update:
                  id: btn_slot4
                  bg_color: 0x0a2a0a
                  border_color: 0x00ff44
            else:
              - lvgl.obj.update:
                  id: btn_slot4
                  bg_color: 0x0a0a1a
                  border_color: 0x1a1a3a

# ── Time ───────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_clock
            text: !lambda |-
              auto now = id(ha_time).now();
              char buf[6];
              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda |-
                auto now = id(ha_time).now();
                char buf[6];
                snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                return std::string(buf);

# ── Fonts ──────────────────────────────────────────────
# ── Feed Polling + Fix Dispatch ────────────────────────
interval:
  # Poll Cortex User-Blackout state -> Slot3 button visual + Status LED (T-13)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/blackout"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  // Backend down: ROT, kein State holbar
                  lv_obj_clear_flag(id(btn_slot3), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0xff0000), 0);
                  id(status_led).turn_off().perform();
                  return;
                }
                bool active = body.find("\"user_blackout\":true") != std::string::npos;
                id(blackout_active) = active;
                if (active) {
                  // active = GRÜN
                  lv_obj_add_state(id(btn_slot3), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0x00ff88), 0);
                } else {
                  // inaktiv = default-blau (gleich wie restliche idle slots)
                  lv_obj_clear_state(id(btn_slot3), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0x1b4965), 0);
                }
                lv_obj_add_flag(id(btn_slot3), LV_OBJ_FLAG_CLICKABLE);
                // T-13: Status-LED rot bei Blackout, sonst aus (Schlafraum-Helligkeit)
                if (active) {
                  auto call = id(status_led).turn_on();
                  call.set_rgb(1.0f, 0.0f, 0.0f);
                  call.set_brightness(0.6f);
                  call.perform();
                } else {
                  id(status_led).turn_off().perform();
                }

  # Dispatch pending fix requests (from button taps)
  - interval: 1s
    then:
      - lambda: |-
          if (id(pending_fix_id).empty()) return;
          // Will be picked up by the http_request below
      - if:
          condition:
            lambda: 'return !id(pending_fix_id).empty();'
          then:
            - http_request.post:
                url: "http://192.168.1.225:8900/api/feed/fix"
                json: |-
                  root["id"] = id(pending_fix_id);
                on_response:
                  - lambda: |-
                      id(pending_fix_id) = "";
  # Poll feed data
  - interval: 30s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/feed"
          capture_response: true
          max_response_buffer_size: 4096
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) return;

                auto extract = [](const std::string &obj, const char* key) -> std::string {
                  std::string needle = std::string("\"") + key + "\":\"";
                  size_t p = obj.find(needle);
                  if (p == std::string::npos) return "";
                  p += needle.size();
                  size_t e = obj.find('"', p);
                  return (e != std::string::npos) ? obj.substr(p, e - p) : "";
                };

                // Update main page summary from first feed entry
                size_t tpos = body.find("\"text\":\"");
                if (tpos != std::string::npos) {
                  tpos += 8;
                  size_t te = tpos;
                  while (te < body.size() && !(body[te] == '"' && body[te-1] != '\\')) te++;
                  std::string raw = body.substr(tpos, te - tpos);
                  std::string txt;
                  for (size_t i = 0; i < raw.size(); i++) {
                    if (raw[i] == '\\' && i+1 < raw.size() && raw[i+1] == 'n') { txt += '\n'; i++; }
                    else txt += raw[i];
                  }
                  size_t nl = txt.find('\n');
                  lv_label_set_text(id(lbl_nabu_msg), (nl != std::string::npos ? txt.substr(0, nl) : txt).c_str());
                }

                // Clear container and rebuild from feed items
                lv_obj_t* cont = id(feed_btn_container);
                lv_obj_clean(cont);
                id(feed_btn_ids).clear();

                size_t fpos = body.find("\"feed\":");
                if (fpos == std::string::npos) return;
                size_t arr_start = body.find('[', fpos);
                if (arr_start == std::string::npos) return;

                size_t cursor = arr_start;
                int idx = 0;
                while (idx < 15) {
                  size_t obj_start = body.find('{', cursor);
                  if (obj_start == std::string::npos) break;
                  size_t obj_end = body.find('}', obj_start);
                  if (obj_end == std::string::npos) break;
                  std::string obj = body.substr(obj_start, obj_end - obj_start + 1);
                  cursor = obj_end + 1;

                  std::string eid = extract(obj, "id");
                  std::string msg = extract(obj, "msg");
                  bool fixable = obj.find("\"fixable\":true") != std::string::npos
                              || obj.find("\"fixable\": true") != std::string::npos;
                  if (msg.empty()) continue;

                  if (fixable && !eid.empty()) {
                    // Tappable bug button (red/amber style)
                    lv_obj_t* btn = lv_btn_create(cont);
                    lv_obj_set_width(btn, 296);
                    lv_obj_set_height(btn, LV_SIZE_CONTENT);
                    lv_obj_set_style_bg_color(btn, lv_color_hex(0x1a0a0a), 0);
                    lv_obj_set_style_border_color(btn, lv_color_hex(0xe94560), 0);
                    lv_obj_set_style_border_width(btn, 1, 0);
                    lv_obj_set_style_radius(btn, 2, 0);
                    lv_obj_set_style_pad_all(btn, 4, 0);
                    // Pressed state
                    lv_obj_set_style_bg_color(btn, lv_color_hex(0x3a1a1a), LV_STATE_PRESSED);

                    lv_obj_t* lbl = lv_label_create(btn);
                    lv_label_set_text(lbl, msg.c_str());
                    lv_obj_set_style_text_font(lbl, id(font_mono_12), 0);
                    lv_obj_set_style_text_color(lbl, lv_color_hex(0xe94560), 0);
                    lv_label_set_long_mode(lbl, LV_LABEL_LONG_DOT);
                    lv_obj_set_width(lbl, 280);

                    // Store index and ID for click handler
                    int btn_idx = id(feed_btn_ids).size();
                    id(feed_btn_ids).push_back(eid);
                    lv_obj_set_user_data(btn, (void*)(intptr_t)btn_idx);

                    // Click callback: POST /api/feed/fix with the stored ID
                    lv_obj_add_event_cb(btn, [](lv_event_t* e) {
                      lv_obj_t* target = lv_event_get_target(e);
                      int i = (int)(intptr_t)lv_obj_get_user_data(target);
                      auto& ids = id(feed_btn_ids);
                      if (i < 0 || i >= (int)ids.size()) return;
                      // Visual feedback
                      lv_obj_t* child = lv_obj_get_child(target, 0);
                      if (child) lv_label_set_text(child, "FIXING...");
                      lv_obj_set_style_border_color(target, lv_color_hex(0x446688), 0);
                      // Store ID for interval-based HTTP POST
                      id(pending_fix_id) = ids[i];
                    }, LV_EVENT_CLICKED, NULL);
                  } else {
                    // Info label (not tappable)
                    lv_obj_t* lbl = lv_label_create(cont);
                    lv_label_set_text(lbl, msg.c_str());
                    lv_obj_set_style_text_font(lbl, id(font_mono_12), 0);
                    lv_obj_set_style_text_color(lbl, lv_color_hex(0x00ff88), 0);
                    lv_label_set_long_mode(lbl, LV_LABEL_LONG_DOT);
                    lv_obj_set_width(lbl, 296);
                    lv_obj_set_style_pad_ver(lbl, 2, 0);
                  }
                  idx++;
                }

                // Timestamp
                auto now = id(ha_time).now();
                if (now.is_valid()) {
                  char tsbuf[8];
                  snprintf(tsbuf, sizeof(tsbuf), "%02d:%02d", now.hour, now.minute);
                  lv_label_set_text(id(lbl_feed_updated), tsbuf);
                }

font:
  - file: "gfonts://Share Tech Mono"
    id: font_mono_24
    size: 24
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ ÄÖÜäöüß"
  - file: "gfonts://Share Tech Mono"
    id: font_mono_16
    size: 16
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ ÄÖÜäöüß"
  - file: "gfonts://Share Tech Mono"
    id: font_mono_12
    size: 12
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ ÄÖÜäöüß"
  - file: "gfonts://Orbitron"
    id: font_header
    size: 18
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]_abcdefghijklmnopqrstuvwxyz~ ÄÖÜäöüß"

# ── LVGL ───────────────────────────────────────────────
lvgl:
  displays: main_display
  touchscreens: main_touch
  buffer_size: 25%
  default_font: font_mono_12

  style_definitions:
    # Deep space background
    - id: style_space
      bg_color: 0x0a0a1a
      bg_opa: COVER
      text_color: 0x00ff88

    # Header bar
    - id: style_header
      bg_color: 0x0f1a3e
      bg_opa: COVER
      text_color: 0x00ccff
      border_color: 0x00ccff
      border_width: 1
      border_side: BOTTOM
      pad_all: 4

    # Script button (Star Wars panel style)
    - id: style_btn
      bg_color: 0x0d1b2a
      bg_opa: COVER
      text_color: 0x00ff88
      border_color: 0x1b4965
      border_width: 2
      radius: 2
      pad_all: 4
      shadow_color: 0x00ff88
      shadow_opa: 30%
      shadow_spread: 1
      shadow_width: 6

    # Button pressed
    - id: style_btn_pressed
      bg_color: 0x1b4965
      text_color: 0x00ffcc
      border_color: 0x00ff88
      shadow_opa: 60%

    # Alert style (red)
    - id: style_alert
      bg_color: 0x1a0a0a
      bg_opa: COVER
      text_color: 0xe94560
      border_color: 0xe94560
      border_width: 1
      radius: 2
      pad_all: 6

    # Feed panel
    - id: style_feed
      bg_color: 0x0a0f1a
      bg_opa: COVER
      text_color: 0x00ff88
      border_color: 0x1b4965
      border_width: 1
      radius: 2
      pad_all: 6

    # Nav button
    - id: style_nav
      bg_color: 0x0f1a3e
      bg_opa: COVER
      text_color: 0x00ccff
      border_color: 0x00ccff
      border_width: 1
      radius: 0
      pad_all: 4

    # Nav active
    - id: style_nav_active
      bg_color: 0x1b4965
      text_color: 0x00ffcc
      border_color: 0x00ff88

  pages:
    # ═══════════════════════════════════════════════════
    # PAGE 1: MAIN - Scripts + Status
    # ═══════════════════════════════════════════════════
    - id: page_main
      bg_color: 0x0a0a1a
      widgets:
        # ── Top header bar ──
        - obj:
            styles: style_header
            width: 320
            height: 28
            x: 0
            y: 0
            widgets:
              - label:
                  id: lbl_clock
                  text: "--:--"
                  text_font: font_mono_16
                  align: LEFT_MID
                  x: 4
              - label:
                  text: "NABU"
                  text_font: font_header
                  text_color: 0xe94560
                  align: CENTER
              - label:
                  id: lbl_zone
                  text: "ZONE: --"
                  text_font: font_mono_12
                  align: RIGHT_MID
                  x: -4

        # ── Slot Buttons Grid (3x3, einheitlich 99x44) ──
        # Dieselbe Geometrie auf allen Pages (CTRL/FEED/AUDIO/DEV).
        # CTRL = User-designed (Leo). Slots 7-9 erstmal frei (TBD-Platzhalter).
        - obj:
            width: 310
            height: 144
            x: 5
            y: 30
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW_WRAP
              flex_align_main: SPACE_EVENLY
              flex_align_cross: START
              pad_column: 6
              pad_row: 6
            widgets:
              # Slot 1: LICHT — script.helles_licht_override (Cortex /api/licht/helles-licht via HA)
              - button:
                  id: btn_slot1
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "LICHT", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - logger.log: "SLOT1: LICHT"
                    - http_request.post:
                        url: "http://192.168.1.225:8123/api/services/script/turn_on"
                        request_headers:
                          Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiIyYmJhNmExYjVhZGM0OWRiYjgyNjdiMGE3NzAxYTM0MSIsImlhdCI6MTc1ODM4MDI3NywiZXhwIjoyMDczNzQwMjc3fQ.DotVSr2qMp6PZQJA5nvjNtMSwT49hk921KzyrM2AfmU"
                          Content-Type: "application/json"
                        body: '{"entity_id":"script.helles_licht_override"}'

              # Slot 2: SYNC — Cortex reconciliation
              - button:
                  id: btn_slot2
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "SYNC", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - logger.log: "SLOT2: SYNC"
                    - http_request.post:
                        url: "http://192.168.1.225:8900/api/sync_to_vibe"
                        request_headers: { Content-Type: "application/json" }
                        body: "{}"

              # Slot 3: BLACKOUT — toggle Cortex User-Blackout (state-driven, amber wenn ON)
              # Bugfix: vorher toggelte der Button input_boolean.nabu_blackout in HA,
              # waehrend der 5s-Poll oben /api/blackout (user_blackout) liest →
              # Button-Visual und Button-Action standen auf zwei verschiedenen
              # State-Quellen. Press hatte keinen Effekt auf das angezeigte State.
              # Fix: direkt /api/blackout/{on,off} POSTen, basierend auf aktuellem Poll-State.
              - button:
                  id: btn_slot3
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "BLACKOUT", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - logger.log: "SLOT3: BLACKOUT toggle (cortex user_blackout)"
                    - if:
