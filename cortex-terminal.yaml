# ════════════════════════════════════════════════════════════════════
# DISPLAY: cortex-terminal  ("Nabu Terminal", PC-Tisch)
# ────────────────────────────────────────────────────────────────────
# Logischer Name: cortex-terminal · Firmware-Hostname: cyd-panel (HA-gepairt,
# flash-fix — NICHT umbenennen) · IP: 192.168.1.240 (siehe displays.yaml).
# Diese Datei = Identitaet + UI. Plattform/Hardware kommt aus common/.
# ════════════════════════════════════════════════════════════════════

substitutions:
  device_name: cyd-panel          # Firmware-Hostname (muss displays.yaml entsprechen)
  static_ip: 192.168.1.240        # flash-fix (muss displays.yaml entsprechen)

esphome:
  name: ${device_name}
  friendly_name: "Nabu Terminal"

packages:
  hardware: !include common/hardware.yaml
  ui_base: !include common/ui_base.yaml

# ── Globals ────────────────────────────────────────────
# (last_touch_x/y leben in common/hardware.yaml — Plattform-Tracking)
globals:
  # Feed button IDs stored for click handler callback
  - id: feed_btn_ids
    type: std::vector<std::string>
    initial_value: 'std::vector<std::string>()'
  # Pending fix: when user taps a bug button, store ID here for the interval to POST
  - id: pending_fix_id
    type: std::string
    initial_value: '""'
  # Cortex User-Blackout state (mirrors /api/blackout poll, drives slot3 + status LED)
  - id: blackout_active
    type: bool
    initial_value: 'false'
    restore_value: false
  # Cortex play_gaming state (combined musik+gaming, drives btn_play_gaming visual)
  - id: play_gaming_active
    type: bool
    initial_value: 'false'
    restore_value: false
  # Cortex night_blackout state (Schlaf-Schutz, drives btn_night visual)
  - id: night_active
    type: bool
    initial_value: 'false'
    restore_value: false
  # Cortex lights-only state (drives btn_lights_only visual via /api/lights_only poll)
  - id: lights_only_active
    type: bool
    initial_value: 'false'
    restore_value: false
  # Cortex zimmerlicht state (drives btn_licht visual via /api/zimmerlicht/state poll)
  - id: zimmerlicht_active
    type: bool
    initial_value: 'false'
    restore_value: false

# ── Text Sensors (HA → Display) ───────────────────────
text_sensor:
  - platform: template
    name: "Nabu Message"
    id: nabu_message
    update_interval: never
    lambda: 'return {"SYSTEMS NOMINAL"};'
  - platform: template
    name: "Watchdog Alert"
    id: watchdog_alert
    update_interval: never
    lambda: 'return {"NO ALERTS"};'
  - platform: template
    name: "Room Zone"
    id: room_zone
    update_interval: never
    lambda: 'return {"--"};'
  - platform: homeassistant
    name: "HA Zone"
    id: ha_zone
    entity_id: sensor.room_zone
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_zone
            text: !lambda 'return ("ZONE: " + x).c_str();'
  - platform: homeassistant
    name: "Management Message"
    id: mgmt_message
    entity_id: input_text.management_message
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_nabu_msg
            text: !lambda 'return x.c_str();'

  # ── Slot State Streams (HA → Button color) ──
  # Slot3 BLACKOUT state: NICHT mehr via HA, Cortex-poll (interval 5s unten)
  # ist die einzige Wahrheit. Der HA-Helper input_boolean.nabu_blackout war
  # unavailable und hat den Button rot+dead gesetzt → entfernt.

  - platform: homeassistant
    name: "Slot4 REBOUND state"
    id: slot4_state
    entity_id: input_boolean.nabu_rebound
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.obj.update:
                  id: btn_slot4
                  bg_color: 0x0a2a0a
                  border_color: 0x00ff44
            else:
              - lvgl.obj.update:
                  id: btn_slot4
                  bg_color: 0x0a0a1a
                  border_color: 0x1a1a3a

  # Slot9 PRED-M state: Watchdog Predictive Maintenance an/aus (WD-45).
  # gruen = aktiv (30-min ESP-fleet-sweep laeuft), dim = gemutet.
  - platform: homeassistant
    name: "Slot9 PRED-M state"
    id: pdm_state
    entity_id: input_boolean.cortex_predictive_maintenance
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - lvgl.obj.update:
                  id: btn_pdm
                  bg_color: 0x0a2a0a
                  border_color: 0x00ff44
            else:
              - lvgl.obj.update:
                  id: btn_pdm
                  bg_color: 0x0a0a1a
                  border_color: 0x1a1a3a

# ── Time ───────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_clock
            text: !lambda |-
              auto now = id(ha_time).now();
              char buf[6];
              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text: !lambda |-
                auto now = id(ha_time).now();
                char buf[6];
                snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                return std::string(buf);

# ── Feed Polling + Fix Dispatch ────────────────────────
interval:
  # DEV-Page Koordinaten-Anzeige aus Plattform-Globals (entkoppelt vom
  # geteilten touchscreen.on_touch in common/hardware.yaml)
  - interval: 500ms
    then:
      - lvgl.label.update:
          id: lbl_dev_coords
          text: !lambda |-
            char buf[32];
            snprintf(buf, sizeof(buf), "LAST: x=%-4d y=%-4d", id(last_touch_x), id(last_touch_y));
            return std::string(buf);

  # Poll Cortex User-Blackout state -> Slot3 button visual + Status LED (T-13)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/blackout"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  // Backend down: ROT, kein State holbar
                  lv_obj_clear_flag(id(btn_slot3), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0xff0000), 0);
                  id(status_led).turn_off().perform();
                  return;
                }
                bool active = body.find("\"user_blackout\":true") != std::string::npos;
                id(blackout_active) = active;
                if (active) {
                  // active = GRÜN
                  lv_obj_add_state(id(btn_slot3), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0x00ff88), 0);
                } else {
                  // inaktiv = default-blau (gleich wie restliche idle slots)
                  lv_obj_clear_state(id(btn_slot3), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_slot3), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_slot3), lv_color_hex(0x1b4965), 0);
                }
                lv_obj_add_flag(id(btn_slot3), LV_OBJ_FLAG_CLICKABLE);
                // T-13: Status-LED rot bei Blackout, sonst aus (Schlafraum-Helligkeit)
                if (active) {
                  auto call = id(status_led).turn_on();
                  call.set_rgb(1.0f, 0.0f, 0.0f);
                  call.set_brightness(0.6f);
                  call.perform();
                } else {
                  id(status_led).turn_off().perform();
                }

  # Poll Cortex zimmerlicht state -> btn_licht visual (gruen=an, blau=aus, rot=error)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/zimmerlicht/state"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  lv_obj_clear_flag(id(btn_licht), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_licht), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_licht), lv_color_hex(0xff0000), 0);
                  return;
                }
                bool active = body.find("\"on\":true") != std::string::npos;
                id(zimmerlicht_active) = active;
                if (active) {
                  lv_obj_add_state(id(btn_licht), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_licht), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_licht), lv_color_hex(0x00ff88), 0);
                  lv_label_set_text(lv_obj_get_child(id(btn_licht), 0), "AN");
                } else {
                  lv_obj_clear_state(id(btn_licht), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_licht), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_licht), lv_color_hex(0x1b4965), 0);
                  lv_label_set_text(lv_obj_get_child(id(btn_licht), 0), "AUS");
                }
                lv_obj_add_flag(id(btn_licht), LV_OBJ_FLAG_CLICKABLE);

  # Poll Cortex play_gaming state -> btn_play_gaming visual (3-state: gruen=both-on, blau=idle, rot=error)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/play_gaming"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  lv_obj_clear_flag(id(btn_play_gaming), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_play_gaming), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_play_gaming), lv_color_hex(0xff0000), 0);
                  return;
                }
                if (body.find("\"play_gaming\":") == std::string::npos) {
                  lv_obj_clear_flag(id(btn_play_gaming), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_play_gaming), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_play_gaming), lv_color_hex(0xff0000), 0);
                  return;
                }
                bool active = body.find("\"play_gaming\":true") != std::string::npos;
                id(play_gaming_active) = active;
                if (active) {
                  lv_obj_add_state(id(btn_play_gaming), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_play_gaming), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_play_gaming), lv_color_hex(0x00ff88), 0);
                } else {
                  lv_obj_clear_state(id(btn_play_gaming), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_play_gaming), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_play_gaming), lv_color_hex(0x1b4965), 0);
                }
                lv_obj_add_flag(id(btn_play_gaming), LV_OBJ_FLAG_CLICKABLE);

  # Poll Cortex night_blackout state -> btn_night visual (3-state: gruen=schlaf-aktiv, blau=tag, rot=error)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/night_blackout"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  lv_obj_clear_flag(id(btn_night), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_night), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_night), lv_color_hex(0xff0000), 0);
                  return;
                }
                if (body.find("\"night_blackout\":") == std::string::npos) {
                  lv_obj_clear_flag(id(btn_night), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_night), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_night), lv_color_hex(0xff0000), 0);
                  return;
                }
                bool active = body.find("\"night_blackout\":true") != std::string::npos;
                id(night_active) = active;
                if (active) {
                  lv_obj_add_state(id(btn_night), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_night), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_night), lv_color_hex(0x00ff88), 0);
                  lv_label_set_text(id(lbl_night), "SLEEP");
                } else {
                  lv_obj_clear_state(id(btn_night), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_night), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_night), lv_color_hex(0x1b4965), 0);
                  lv_label_set_text(id(lbl_night), "AWAKE");
                }
                lv_obj_add_flag(id(btn_night), LV_OBJ_FLAG_CLICKABLE);

  # Poll Cortex lights-only state -> btn_lights_only visual (gruen=ON, blau=OFF, rot=error)
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/lights_only"
          capture_response: true
          max_response_buffer_size: 256
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) {
                  lv_obj_clear_flag(id(btn_lights_only), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_lights_only), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_lights_only), lv_color_hex(0xff0000), 0);
                  return;
                }
                if (body.find("\"lights_only\":") == std::string::npos) {
                  lv_obj_clear_flag(id(btn_lights_only), LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_set_style_bg_color(id(btn_lights_only), lv_color_hex(0x1a0808), 0);
                  lv_obj_set_style_border_color(id(btn_lights_only), lv_color_hex(0xff0000), 0);
                  return;
                }
                bool active = body.find("\"lights_only\":true") != std::string::npos;
                id(lights_only_active) = active;
                if (active) {
                  lv_obj_add_state(id(btn_lights_only), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_lights_only), lv_color_hex(0x0d2a14), 0);
                  lv_obj_set_style_border_color(id(btn_lights_only), lv_color_hex(0x00ff44), 0);
                } else {
                  lv_obj_clear_state(id(btn_lights_only), LV_STATE_CHECKED);
                  lv_obj_set_style_bg_color(id(btn_lights_only), lv_color_hex(0x0d1b2a), 0);
                  lv_obj_set_style_border_color(id(btn_lights_only), lv_color_hex(0x1b4965), 0);
                }
                lv_obj_add_flag(id(btn_lights_only), LV_OBJ_FLAG_CLICKABLE);

  # Dispatch pending fix requests (from button taps)
  - interval: 1s
    then:
      - lambda: |-
          if (id(pending_fix_id).empty()) return;
          // Will be picked up by the http_request below
      - if:
          condition:
            lambda: 'return !id(pending_fix_id).empty();'
          then:
            - http_request.post:
                url: "http://192.168.1.225:8900/api/feed/fix"
                json: |-
                  root["id"] = id(pending_fix_id);
                on_response:
                  - lambda: |-
                      id(pending_fix_id) = "";
  # Poll feed data
  - interval: 30s
    then:
      - http_request.get:
          url: "http://192.168.1.225:8900/api/feed"
          capture_response: true
          max_response_buffer_size: 4096
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) return;

                auto extract = [](const std::string &obj, const char* key) -> std::string {
                  std::string needle = std::string("\"") + key + "\":\"";
                  size_t p = obj.find(needle);
                  if (p == std::string::npos) return "";
                  p += needle.size();
                  size_t e = obj.find('"', p);
                  return (e != std::string::npos) ? obj.substr(p, e - p) : "";
                };

                // Update main page summary from first feed entry
                size_t tpos = body.find("\"text\":\"");
                if (tpos != std::string::npos) {
                  tpos += 8;
                  size_t te = tpos;
                  while (te < body.size() && !(body[te] == '"' && body[te-1] != '\\')) te++;
                  std::string raw = body.substr(tpos, te - tpos);
                  std::string txt;
                  for (size_t i = 0; i < raw.size(); i++) {
                    if (raw[i] == '\\' && i+1 < raw.size() && raw[i+1] == 'n') { txt += '\n'; i++; }
                    else txt += raw[i];
                  }
                  size_t nl = txt.find('\n');
                  lv_label_set_text(id(lbl_nabu_msg), (nl != std::string::npos ? txt.substr(0, nl) : txt).c_str());
                }

                // Clear container and rebuild from feed items
                lv_obj_t* cont = id(feed_btn_container);
                lv_obj_clean(cont);
                id(feed_btn_ids).clear();

                size_t fpos = body.find("\"feed\":");
                if (fpos == std::string::npos) return;
                size_t arr_start = body.find('[', fpos);
                if (arr_start == std::string::npos) return;

                size_t cursor = arr_start;
                int idx = 0;
                while (idx < 15) {
                  size_t obj_start = body.find('{', cursor);
                  if (obj_start == std::string::npos) break;
                  size_t obj_end = body.find('}', obj_start);
                  if (obj_end == std::string::npos) break;
                  std::string obj = body.substr(obj_start, obj_end - obj_start + 1);
                  cursor = obj_end + 1;

                  std::string eid = extract(obj, "id");
                  std::string msg = extract(obj, "msg");
                  bool fixable = obj.find("\"fixable\":true") != std::string::npos
                              || obj.find("\"fixable\": true") != std::string::npos;
                  if (msg.empty()) continue;

                  if (fixable && !eid.empty()) {
                    // Tappable bug button (red/amber style)
                    lv_obj_t* btn = lv_btn_create(cont);
                    lv_obj_set_width(btn, 296);
                    lv_obj_set_height(btn, LV_SIZE_CONTENT);
                    lv_obj_set_style_bg_color(btn, lv_color_hex(0x1a0a0a), 0);
                    lv_obj_set_style_border_color(btn, lv_color_hex(0xe94560), 0);
                    lv_obj_set_style_border_width(btn, 1, 0);
                    lv_obj_set_style_radius(btn, 2, 0);
                    lv_obj_set_style_pad_all(btn, 4, 0);
                    // Pressed state
                    lv_obj_set_style_bg_color(btn, lv_color_hex(0x3a1a1a), LV_STATE_PRESSED);

                    lv_obj_t* lbl = lv_label_create(btn);
                    lv_label_set_text(lbl, msg.c_str());
                    lv_obj_set_style_text_font(lbl, id(font_mono_12), 0);
                    lv_obj_set_style_text_color(lbl, lv_color_hex(0xe94560), 0);
                    lv_label_set_long_mode(lbl, LV_LABEL_LONG_DOT);
                    lv_obj_set_width(lbl, 280);

                    // Store index and ID for click handler
                    int btn_idx = id(feed_btn_ids).size();
                    id(feed_btn_ids).push_back(eid);
                    lv_obj_set_user_data(btn, (void*)(intptr_t)btn_idx);

                    // Click callback: POST /api/feed/fix with the stored ID
                    lv_obj_add_event_cb(btn, [](lv_event_t* e) {
                      lv_obj_t* target = lv_event_get_target(e);
                      int i = (int)(intptr_t)lv_obj_get_user_data(target);
                      auto& ids = id(feed_btn_ids);
                      if (i < 0 || i >= (int)ids.size()) return;
                      // Visual feedback
                      lv_obj_t* child = lv_obj_get_child(target, 0);
                      if (child) lv_label_set_text(child, "FIXING...");
                      lv_obj_set_style_border_color(target, lv_color_hex(0x446688), 0);
                      // Store ID for interval-based HTTP POST
                      id(pending_fix_id) = ids[i];
                    }, LV_EVENT_CLICKED, NULL);
                  } else {
                    // Info label (not tappable)
                    lv_obj_t* lbl = lv_label_create(cont);
                    lv_label_set_text(lbl, msg.c_str());
                    lv_obj_set_style_text_font(lbl, id(font_mono_12), 0);
                    lv_obj_set_style_text_color(lbl, lv_color_hex(0x00ff88), 0);
                    lv_label_set_long_mode(lbl, LV_LABEL_LONG_DOT);
                    lv_obj_set_width(lbl, 296);
                    lv_obj_set_style_pad_ver(lbl, 2, 0);
                  }
                  idx++;
                }

                // Timestamp
                auto now = id(ha_time).now();
                if (now.is_valid()) {
                  char tsbuf[8];
                  snprintf(tsbuf, sizeof(tsbuf), "%02d:%02d", now.hour, now.minute);
                  lv_label_set_text(id(lbl_feed_updated), tsbuf);
                }

# ── LVGL Pages (ergaenzt common/ui_base.yaml lvgl-Basis) ───────────────
lvgl:
  pages:
    # ═══════════════════════════════════════════════════
    # PAGE 1: MAIN - Scripts + Status
    # ═══════════════════════════════════════════════════
    - id: page_main
      bg_color: 0x0a0a1a
      widgets:
        # ── Top header bar ──
        - obj:
            styles: style_header
            width: 320
            height: 28
            x: 0
            y: 0
            widgets:
              - label:
                  id: lbl_clock
                  text: "--:--"
                  text_font: font_mono_16
                  align: LEFT_MID
                  x: 4
              - label:
                  text: "NABU"
                  text_font: font_header
                  text_color: 0xe94560
                  align: CENTER
              - label:
                  id: lbl_zone
                  text: "ZONE: --"
                  text_font: font_mono_12
                  align: RIGHT_MID
                  x: -4

        # ── Slot Buttons Grid (3x3, einheitlich 99x44) ──
        - obj:
            width: 310
            height: 144
            x: 5
            y: 30
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW_WRAP
              flex_align_main: SPACE_EVENLY
              flex_align_cross: START
              pad_column: 6
              pad_row: 6
            widgets:
              # Slot 1: LICHT — stateful toggle /api/zimmerlicht/toggle (gruen=an, blau=aus)
              - button:
                  id: btn_licht
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label:
                        id: lbl_licht
                        text: "AUS"
