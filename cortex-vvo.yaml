# ════════════════════════════════════════════════════════════════════
# DISPLAY: cortex-vvo  (Zweitdisplay) — VVO-Abfahrtstafel (Welle 3)
# ────────────────────────────────────────────────────────────────────
# Logischer Name + Firmware-Hostname: cortex-vvo · IP: 192.168.1.241
# (siehe displays.yaml). Plattform/Hardware aus common/.
#
# Zeigt Dresdner VVO-Abfahrten fuer ZWEI Haltestellen:
#   • Dresden Hauptbahnhof       stopid 33000028
#   • Dresden Hauptbahnhof Nord  stopid 33000032
# Gefiltert auf Tram + S-Bahn (SuburbanRailway), keine Busse; S-Bahn
# nur Richtung Neustadt (suedwaerts gehende Endpunkte werden verworfen).
#
# Datenquelle: VVO DepartureMonitor (POST https://webapi.vvo-online.de/dm).
# Der ESP pollt direkt (HTTPS) — kein Cortex-Proxy noetig, da hier nur
# Format-Parsing (kein State/Resolver) anfaellt: A→C statt A→B→C. Die
# Antwort liefert Zeiten im Microsoft-JSON-Format "/Date(ms+tz)/"; der
# Countdown wird in common/vvo_parse.h gegen ha_time gerechnet.
# ════════════════════════════════════════════════════════════════════

substitutions:
  device_name: cortex-vvo         # Firmware-Hostname (muss displays.yaml entsprechen)
  static_ip: 192.168.1.241        # flash-fix (muss displays.yaml entsprechen)

esphome:
  name: ${device_name}
  friendly_name: "Cortex VVO"
  includes:
    - common/vvo_parse.h

packages:
  hardware: !include common/hardware.yaml
  ui_base: !include common/ui_base.yaml

# ── Zeitbasis fuer Countdown-Berechnung ───────────────────────────────
time:
  - platform: homeassistant
    id: ha_time

# ── VVO-Poll: ein Interval pro Haltestelle ────────────────────────────
# Beide rufen denselben DepartureMonitor mit ihrer stopid auf; vvo::render
# parst den Body und schreibt die Zeilen ins jeweilige Panel-Label.
# Versetzt (Nord +15s) damit nie zwei TLS-Reads kollidieren.
interval:
  - interval: 30s
    then:
      - http_request.post:
          url: "https://webapi.vvo-online.de/dm?format=json"
          request_headers: { Content-Type: "application/json" }
          body: '{"stopid":"33000028","limit":7,"mot":["Tram","SuburbanRailway"],"format":"json"}'
          capture_response: true
          max_response_buffer_size: 8192
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) return;
                vvo::render(body, id(lbl_hbf), id(ha_time), 7);

  - interval: 30s
    then:
      - delay: 15s
      - http_request.post:
          url: "https://webapi.vvo-online.de/dm?format=json"
          request_headers: { Content-Type: "application/json" }
          body: '{"stopid":"33000032","limit":7,"mot":["Tram","SuburbanRailway"],"format":"json"}'
          capture_response: true
          max_response_buffer_size: 8192
          on_response:
            - lambda: |-
                if (response->status_code != 200 || body.empty()) return;
                vvo::render(body, id(lbl_hbfn), id(ha_time), 7);

  # Header-Uhr (lokale ha_time) im Minutentakt aktualisiert
  - interval: 10s
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;
          char buf[6];
          snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
          lv_label_set_text(id(lbl_clock), buf);

# ── LVGL Pages (ergaenzt common/ui_base.yaml lvgl-Basis) ───────────────
# Vertikaler Split: zwei Spalten ueber die volle Display-Hoehe.
#   LINKS  = Hauptbahnhof Nord (lbl_hbfn)
#   RECHTS = Hauptbahnhof       (lbl_hbf)
# Header-Leiste oben quer (Titel + Uhr), darunter die beiden Spalten 0..240.
lvgl:
  pages:
    - id: page_vvo
      bg_color: 0x0a0a1a
      widgets:
        # ── Header quer: Titel links, Uhr rechts ──
        - obj:
            styles: style_header
            width: 320
            height: 24
            x: 0
            y: 0
            pad_all: 0
            widgets:
              - label:
                  text: "VVO // DD"
                  text_font: font_mono_16
                  text_color: 0x00ccff
                  align: LEFT_MID
                  x: 6
              - label:
                  id: lbl_clock
                  text: "--:--"
                  text_font: font_mono_16
                  text_color: 0x00ff88
                  align: RIGHT_MID
                  x: -6

        # ── Senkrechter Trenner mittig ──
        - obj:
            width: 2
            height: 212
            x: 159
            y: 26
            bg_color: 0x1a3a5a
            border_width: 0
            radius: 0

        # ── LINKE Spalte: Hauptbahnhof Nord ──
        - label:
            text: "HBF NORD"
            text_font: font_mono_12
            text_color: 0x00ccff
            x: 6
            y: 28
        - obj:
            styles: style_feed
            width: 152
            height: 192
            x: 2
            y: 44
            pad_all: 3
            widgets:
              - label:
                  id: lbl_hbfn
                  text: "-- lade --"
                  text_font: font_mono_12
                  text_color: 0x00ff88
                  align: TOP_LEFT

        # ── RECHTE Spalte: Hauptbahnhof ──
        - label:
            text: "HAUPTBAHNHOF"
            text_font: font_mono_12
            text_color: 0x00ccff
            x: 166
            y: 28
        - obj:
            styles: style_feed
            width: 152
            height: 192
            x: 164
            y: 44
            pad_all: 3
            widgets:
              - label:
                  id: lbl_hbf
                  text: "-- lade --"
                  text_font: font_mono_12
                  text_color: 0x00ff88
                  align: TOP_LEFT
