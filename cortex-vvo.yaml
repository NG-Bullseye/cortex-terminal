# ════════════════════════════════════════════════════════════════════
# DISPLAY: cortex-vvo  (Zweitdisplay)
# ────────────────────────────────────────────────────────────────────
# Logischer Name + Firmware-Hostname: cortex-vvo · IP: 192.168.1.241
# (siehe displays.yaml). Spiegelt vorerst die CTRL2-Page (Switch-Toggles)
# als Geruest — der eigentliche VVO-API-Inhalt (Abfahrten) kommt in
# Welle 3. Plattform/Hardware aus common/, hier nur Identitaet + UI.
# ════════════════════════════════════════════════════════════════════

substitutions:
  device_name: cortex-vvo         # Firmware-Hostname (muss displays.yaml entsprechen)
  static_ip: 192.168.1.241        # flash-fix (muss displays.yaml entsprechen)

esphome:
  name: ${device_name}
  friendly_name: "Cortex VVO"

packages:
  hardware: !include common/hardware.yaml
  ui_base: !include common/ui_base.yaml

# ── LVGL Pages (ergaenzt common/ui_base.yaml lvgl-Basis) ───────────────
# Single-Page-Spiegel der CTRL2-Switches. Keine Nav-Bar (nur eine Page).
# In Welle 3 wird der Inhalt durch die VVO-Abfahrtstafel ersetzt.
lvgl:
  pages:
    - id: page_ctrl2
      bg_color: 0x0a0a1a
      widgets:
        - obj:
            styles: style_header
            width: 320
            height: 28
            x: 0
            y: 0
            widgets:
              - label: { text: "VVO // CTRL2 MIRROR", text_font: font_mono_16, text_color: 0x00ccff, align: CENTER }

        # 3x3 Toggle-Grid — alle homeassistant.action switch.toggle / light.toggle
        - obj:
            width: 310
            height: 144
            x: 5
            y: 30
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW_WRAP
              flex_align_main: SPACE_EVENLY
              flex_align_cross: START
              pad_column: 6
              pad_row: 6
            widgets:
              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "PFLANZE", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.pflanzenlampe } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "KERZE", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.kerze } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "PC-STR", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.pc_strahler } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "BEAM-SND", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.beamer_sound } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "BEAM-PWR", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.beamer_power } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "FIRETV-P", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.fire_tv_smartsocket } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "HELIX", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: light.toggle, data: { entity_id: light.helix } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "KAKTUS", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: light.toggle, data: { entity_id: light.kaktus } }

              - button:
                  styles: style_btn
                  pressed: { styles: style_btn_pressed }
                  width: 99
                  height: 44
                  widgets:
                    - label: { text: "LEDS", text_font: font_mono_12, align: CENTER }
                  on_release:
                    - homeassistant.action: { action: switch.toggle, data: { entity_id: switch.strahler_oben } }

        # Footer-Hinweis (Platzhalter bis VVO-Inhalt in Welle 3)
        - obj:
            styles: style_feed
            width: 310
            height: 38
            x: 5
            y: 184
            widgets:
              - label:
                  text: "VVO-Abfahrten folgen (Welle 3)"
                  text_font: font_mono_12
                  text_color: 0x446688
                  align: LEFT_MID
                  x: 4
